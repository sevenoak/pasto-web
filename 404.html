<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasto — Page non trouvée</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #F5F3F0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card {
            background: white; border-radius: 28px; padding: 48px 36px;
            max-width: 420px; width: 100%; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 900; color: #1A1A1A; margin-bottom: 12px; }
        p { font-size: 15px; color: #6B7280; line-height: 1.6; margin-bottom: 28px; }
        .btn {
            display: inline-block; background: #2D7B5E; color: white;
            font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
            padding: 14px 36px; border-radius: 14px; text-decoration: none;
        }
        .btn:hover { background: #4CAF82; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🍽️</div>
    <h1>Oups, cette page n'existe pas</h1>
    <p>Pas de panique ! Retourne à l'accueil pour découvrir Pasto.</p>
    <a class="btn" href="https://mypasto.fr">Retour à l'accueil</a>
</div>
</body>
</html>
