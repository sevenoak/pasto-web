<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasto — Redirection</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #2D7B5E; --bg: #F5F3F0; --card: #FFFFFF; --text: #1A1A1A; --text-sec: #6B7280; --border: #E5E0D8; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { background: var(--card); border-radius: 28px; padding: 48px 36px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        .icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 36px; }
        h1 { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 12px; }
        p { font-size: 15px; color: var(--text-sec); line-height: 1.6; margin-bottom: 20px; }
        .btn { display: inline-block; background: var(--primary); color: white; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; padding: 14px 36px; border-radius: 14px; text-decoration: none; }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--border); margin-top: 12px; }
        .brand { margin-top: 32px; font-size: 13px; color: var(--text-sec); opacity: 0.7; }
        .brand strong { color: var(--primary); }
        .spinner { width: 36px; height: 36px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div id="state-loading">
        <div class="icon" style="background: #E8F5EE;"><div class="spinner"></div></div>
        <h1>Redirection…</h1>
        <p>On t'envoie vers l'app, une seconde.</p>
    </div>
    <div id="state-success" class="hidden">
        <div class="icon" style="background: #DCFCE7;">✅</div>
        <h1>C'est bon !</h1>
        <p>Tu peux retourner dans l'app. Si elle ne s'ouvre pas automatiquement, clique ci-dessous.</p>
        <a id="btn-open" class="btn" href="#">Ouvrir Pasto</a>
        <br>
        <a class="btn btn-outline" href="https://mypasto.fr" style="margin-top:12px;">Retour au site</a>
        <div class="brand">🍽️ <strong>Pasto</strong></div>
    </div>
    <div id="state-error" class="hidden">
        <div class="icon" style="background: #FEE2E2;">❌</div>
        <h1>Lien invalide</h1>
        <p>Ce lien a peut-être expiré. Réessaie depuis l'app.</p>
        <a class="btn" href="https://mypasto.fr">Retour au site</a>
        <div class="brand">🍽️ <strong>Pasto</strong></div>
    </div>
</div>

<script>
(function() {
    // Collecter TOUS les paramètres (query string + hash fragment)
    var allParams = {};
    
    // Query string: ?code=xxx&type=signup
    var qs = window.location.search.substring(1);
    if (qs) {
        var qsPairs = new URLSearchParams(qs);
        qsPairs.forEach(function(v, k) { allParams[k] = v; });
    }
    
    // Hash fragment: #access_token=xxx&refresh_token=xxx
    var hash = window.location.hash.substring(1);
    if (hash) {
        var hashPairs = new URLSearchParams(hash);
        hashPairs.forEach(function(v, k) { allParams[k] = v; });
    }

    var code = allParams['code'];
    var tokenHash = allParams['token_hash'];
    var accessToken = allParams['access_token'];
    var refreshToken = allParams['refresh_token'];
    var type = allParams['type'] || 'signup';

    // Rien trouvé → erreur
    if (!code && !tokenHash && !accessToken) {
        show('error');
        return;
    }

    // Construire le deep link avec TOUS les params pertinents dans le query string
    // (pas dans le hash — Android/Expo Router ne gère pas bien les hash fragments)
    var deepLinkParams = [];
    
    if (code) {
        deepLinkParams.push('code=' + encodeURIComponent(code));
    }
    if (tokenHash) {
        deepLinkParams.push('token_hash=' + encodeURIComponent(tokenHash));
        deepLinkParams.push('type=' + encodeURIComponent(type));
    }
    if (accessToken) {
        deepLinkParams.push('access_token=' + encodeURIComponent(accessToken));
    }
    if (refreshToken) {
        deepLinkParams.push('refresh_token=' + encodeURIComponent(refreshToken));
    }
    // Copier provider_token, expires_in, etc. s'ils sont présents
    if (allParams['provider_token']) {
        deepLinkParams.push('provider_token=' + encodeURIComponent(allParams['provider_token']));
    }
    if (allParams['expires_in']) {
        deepLinkParams.push('expires_in=' + encodeURIComponent(allParams['expires_in']));
    }

    var deepLink = 'pasto://?' + deepLinkParams.join('&');
    
    document.getElementById('btn-open').href = deepLink;

    // Tenter d'ouvrir l'app
    window.location.href = deepLink;

    // Afficher le bouton après un délai
    setTimeout(function() {
        show('success');
        try { window.close(); } catch(e) {}
    }, 1500);
})();

function show(state) {
    document.getElementById('state-loading').classList.add('hidden');
    document.getElementById('state-success').classList.add('hidden');
    document.getElementById('state-error').classList.add('hidden');
    document.getElementById('state-' + state).classList.remove('hidden');
}
</script>
</body>
</html>
